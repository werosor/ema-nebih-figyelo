name: EMA + NÉBIH napi figyelés

on:
  schedule:
    - cron: '0 5 * * *'  # UTC 05:00 = Budapest 07:00 (télen), 08:00 (nyáron)
  workflow_dispatch:      # kézi futtatás is lehetséges

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Kód letöltése
        uses: actions/checkout@v4

      - name: Python beállítása
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Függőségek telepítése
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Előző snapshot visszaállítása
        uses: actions/cache@v4
        with:
          path: ema_state/
          key: ema-snapshot-${{ github.run_id }}
          restore-keys: |
            ema-snapshot-

      - name: EMA scraper futtatása
        run: python ema_register_scraper.py --output-dir output

      - name: NÉBIH scraper futtatása
        run: python nebih_scraper.py --top 20 --output output/nebih_latest.csv

      - name: Email küldése
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
          RECIPIENT: ${{ secrets.RECIPIENT }}
        run: python send_report.py
